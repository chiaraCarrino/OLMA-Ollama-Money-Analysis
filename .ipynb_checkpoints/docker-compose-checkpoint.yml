
services:

  # ─────────────────────────────────────────
  # Servizio principale: app Streamlit
  # ─────────────────────────────────────────
  olma:
    build: .
    name: olma
    ports:
      - "8501:8501"
    environment:
      # Se l'utente ha Ollama sul suo PC, può sovrascrivere questa variabile
      # nel file .env (vedi .env.example)
      # Se usa il profilo --profile with-ollama, questo default funziona già
      # Endpoint per l'agente di classificazione (enrich.py)
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
       # Endpoint per l'agente chat (chat_agent.py)
      # Stesso host di OLLAMA_URL ma path diverso — tenerle separate
      # permette di puntarle a istanze diverse se necessario
      - OLLAMA_CHAT_URL=${OLLAMA_CHAT_URL:-http://host.docker.internal:11434/api/chat}
      # Modello usato dall'agente classificazione
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      # Modello usato dall'agente chat — più capace, necessario per tool calling
      - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-qwen2.5:14b}
    volumes:
      # Persiste la cache delle classificazioni Ollama tra un riavvio e l'altro
      # Cache classificazioni (shelve + MD5)
      - ./cache_ollama:/app/cache_ollama
      # Cache/history agente chat (per sviluppi futuri)
      - ./cache_chat:/app/cache_chat
    
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Servizio Ollama (OPZIONALE)
  # Si avvia solo con: docker-compose --profile with-ollama up
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama
    profiles:
      - with-ollama
    volumes:
      # Persiste il modello scaricato (~2GB) tra un riavvio e l'altro
      # In questo modo viene scaricato una volta sola
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Servizio temporaneo: Scarica entrambi i modelli al primo avvio
  # Parte e si ferma da solo una volta completato il download
  # Si avvia solo con: docker-compose --profile with-ollama up
  # ─────────────────────────────────────────
  model-puller:
    image: curlimages/curl:latest
    profiles:
      - with-ollama
    depends_on:
      - ollama
    command: >
      sh -c "
        echo 'Aspetto che Ollama sia pronto...';
        until curl -sf http://ollama:11434/ > /dev/null 2>&1; do
          echo 'Non ancora pronto, riprovo tra 3 secondi...';
          sleep 3;
        done;
        echo 'Ollama pronto.';

        echo 'Scarico llama3.2 (agente classificazione, ~2GB)...';
        curl -s http://ollama:11434/api/pull \
          -d '{\"name\":\"llama3.2\"}' \
          --no-buffer | grep -E '(status|error)' || true;

        echo 'Scarico qwen2.5:14b (agente chat, ~9GB)...';
        curl -s http://ollama:11434/api/pull \
          -d '{\"name\":\"qwen2.5:14b\"}' \
          --no-buffer | grep -E '(status|error)' || true;

        echo 'Entrambi i modelli pronti.'
      "
    restart: "no"

volumes:
  # Volume Docker gestito automaticamente per il modello Ollama
  # Persiste anche se i container vengono fermati o rimossi
  ollama_models:
